apiVersion: apps/v1
kind: Deployment
metadata: {name: recommender-api, namespace: recommender}
spec:
  replicas: 3
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
  selector: {matchLabels: {app: recommender-api}}
  template:
    metadata: {labels: {app: recommender-api}}
    spec:
      serviceAccountName: recommender-api
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: api
          image: example.invalid/recommender:replace-with-digest
          args: [serve, --config, /etc/recommender/config.yaml]
          ports: [{name: http, containerPort: 8000}]
          envFrom: [{secretRef: {name: recommender-secrets}}]
          volumeMounts:
            - {name: config, mountPath: /etc/recommender, readOnly: true}
            - {name: artifacts, mountPath: /var/lib/recommender/artifacts, readOnly: true}
            - {name: tmp, mountPath: /tmp}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources: {requests: {cpu: 500m, memory: 1Gi}, limits: {cpu: "2", memory: 4Gi}}
          startupProbe: {httpGet: {path: /health/ready, port: http}, failureThreshold: 30, periodSeconds: 5}
          readinessProbe: {httpGet: {path: /health/ready, port: http}, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /health/live, port: http}, periodSeconds: 20}
      volumes:
        - name: config
          configMap: {name: recommender-config}
        - name: artifacts
          persistentVolumeClaim: {claimName: recommender-artifacts}
        - name: tmp
          emptyDir: {sizeLimit: 256Mi}
