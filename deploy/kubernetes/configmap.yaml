apiVersion: v1
kind: ConfigMap
metadata: {name: recommender-config, namespace: recommender}
data:
  config.yaml: |
    environment: production
    seed: 1729
    paths: {data_dir: /var/lib/recommender/data, artifact_dir: /var/lib/recommender/artifacts, report_dir: /tmp/reports}
    data: {num_users: 10000, num_items: 50000, num_events: 1000000, invalid_fraction: 0, duplicate_fraction: 0, train_fraction: 0.8, validation_fraction: 0.1}
    features: {min_frequency: 2, max_history: 50}
    model: {embedding_dim: 128, id_embedding_dim: 64, categorical_embedding_dim: 16, hidden_dims: [256, 128], dropout: 0.1, similarity: cosine, temperature: 0.07}
    training: {epochs: 20, batch_size: 1024, learning_rate: 0.001, patience: 3}
    evaluation: {ks: [10, 50, 100], bootstrap_samples: 1000}
    index: {backend: faiss, metric: cosine, search_candidates: 500}
    serving: {host: 0.0.0.0, port: 8000, max_k: 100, default_k: 20, max_batch_size: 100, request_timeout_seconds: 0.5}
