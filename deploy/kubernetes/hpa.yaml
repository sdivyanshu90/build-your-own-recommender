apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: recommender-api, namespace: recommender}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: recommender-api}
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}
